# Netlify build settings for the Astro static site.
# Connect the repo in the Netlify UI; these values are picked up automatically.
#
# Build policy — credits guard:
# Only pushes to `main` (the production context) run a real build.
# Deploy previews and branch deploys self-cancel during initialization
# (ignore exiting 0 = skip; skipped builds don't consume build minutes).
# Production keeps Netlify's default skip-when-unchanged diff check.
# A commit message containing [skip netlify] skips even production.

[build]
  command = "npm run build"
  publish = "dist"
  ignore = "if [ \"$CONTEXT\" != \"production\" ]; then exit 0; else git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF; fi"

[build.environment]
  NODE_VERSION = "22"
